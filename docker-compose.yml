services:
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/medical-rag-password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  postgres:
    image: ankane/pgvector:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: kankerwijzer
      POSTGRES_PASSWORD: kankerwijzer
      POSTGRES_DB: kankerwijzer
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/app/storage/init.sql:/docker-entrypoint-initdb.d/01-init.sql

volumes:
  neo4j_data:
  qdrant_data:
  postgres_data:
