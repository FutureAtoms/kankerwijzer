name: Feature request
description: Suggest a product, safety, or developer-experience improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety and provenance considerations
      description: How should this interact with trusted-source rules and medical guardrails?
    validations:
      required: true
