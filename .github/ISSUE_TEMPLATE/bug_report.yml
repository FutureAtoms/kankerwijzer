name: Bug report
description: Report a defect in app behavior, safety handling, or developer workflow
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include query examples, API calls, or exact commands when possible.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety impact
      description: Does this affect source trust, medical safety, privacy, or security?
    validations:
      required: true
